name: Daily Mutual Fund Data Update

on:
  schedule:
    # Run at 10:00 AM UTC every day
    - cron: '0 10 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

jobs:
  update-mutual-fund-data:
    name: Update Mutual Fund Data
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || pip install playwright chromadb requests python-dotenv
        playwright install chromium
    
    - name: Run Scheduler - Full Data Update
      id: scheduler
      run: |
        python -m phase5_scheduler.scheduler
      env:
        PYTHONPATH: ${{ github.workspace }}
      continue-on-error: false
    
    - name: Check for changes
      id: check_changes
      run: |
        git add data/funds.json
        if git diff --cached --quiet; then
          echo "No changes detected"
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected"
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git commit -m "Update mutual fund data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        git push
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: scheduler-logs
        path: |
          *.log
        retention-days: 7
    
    - name: Notify on success
      if: success()
      run: |
        echo "✅ Mutual fund data updated successfully at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "Last updated timestamp:"
        python -c "from phase5_scheduler.scheduler import get_last_updated; print(get_last_updated())"
    
    - name: Notify on failure
      if: failure()
      run: |
        echo "❌ Mutual fund data update failed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "Please check the logs for details."
