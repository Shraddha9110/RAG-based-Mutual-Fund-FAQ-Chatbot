name: Daily Data Sync Scheduler

on:
  schedule:
    - cron: '0 10 * * *' # Run at 10:00 AM UTC everyday
  workflow_dispatch: # Allow manual triggers

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright chromadb
          playwright install chromium

      - name: Run Scheduler
        run: |
          python phase5_scheduler/scheduler.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ vector_db/
          git commit -m "Auto-update: Sync mutual fund data and vector DB" || echo "No changes to commit"
          git push
